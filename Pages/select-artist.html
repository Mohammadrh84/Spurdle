<!DOCTYPE html>
<html>
<head>
    <title>Select Artist - Spurdle</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../Scripts/tailwind-config.js"></script>
    <script src="../Scripts/script.js" defer></script>
    <script src="../Scripts/select-artist.js" defer></script>
</head>

<body class="bg-background-black text-white min-h-screen">
    <main class="max-w-6xl mx-auto px-4 py-6 md:px-8 lg:px-12">
        <header class="rounded-[28px] border border-white/10 bg-black/40 p-4 shadow-[0_0_30px_rgba(0,0,0,0.25)] md:p-6">
            <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <a href="welcome.html" class="inline-block">
                    <h1 class="font-syne text-5xl leading-none md:text-6xl">
                        <span class="text-white">spu</span><span class="text-neon-green">rdle</span>
                    </h1>
                </a>

                <nav class="flex flex-wrap items-center gap-3 text-sm font-semibold md:gap-6">
                    <a href="leaderboard.html" class="transition hover:text-neon-green">Leaderboard</a>
                    <a href="sign-in.html" class="transition hover:text-neon-green">Login</a>
                    <a
                        href="#artistSearch"
                        class="rounded-xl bg-neon-green px-4 py-2 text-black transition hover:scale-105"
                    >
                        Choose artists
                    </a>
                </nav>
            </div>

            <div class="mt-8">
                <p class="text-sm uppercase tracking-[0.35em] text-neon-green/80">artist setup</p>
                <h2 class="mt-3 text-4xl font-bold md:text-5xl">Select your artists</h2>
                <p class="mt-4 max-w-2xl text-sm leading-6 text-white/70 md:text-base">
                    Search for artists you want in your game and add them to your selected list.
                </p>
            </div>
        </header>

        <section class="mt-6 rounded-[28px] border border-white/10 bg-[#131318] p-4 md:p-6">
            <div class="mx-auto max-w-3xl">
                <div class="relative">
                    <input
                        id="artistSearch"
                        type="text"
                        autocomplete="off"
                        placeholder="Search artists"
                        class="w-full rounded-[28px] border border-white/10 bg-black/30 px-4 py-3 text-base text-white outline-none placeholder:text-white/35 focus:border-neon-green"
                    >

                    <div
                        id="searchResultsWrap"
                        class="absolute left-0 right-0 z-[99] mt-3 hidden overflow-hidden rounded-2xl border border-white/10 bg-card-black shadow-xl shadow-black/50"
                    >
                        <ul
                            id="searchResults"
                            class="max-h-72 overflow-y-auto"
                        ></ul>
                    </div>
                </div>

                <div class="mt-10">
                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                        <div>
                            <h3 class="text-2xl font-bold md:text-3xl">Selected Artist/s:</h3>
                            <p class="mt-1 text-sm text-white/55">
                                Choose 1 to 10 artists before starting the game.
                            </p>
                        </div>

                        <div class="flex items-center gap-3">
                            <p id="selectedArtistsSummary" class="text-sm text-white/60">0 / 10 selected</p>

                            <button
                                id="clearArtistsButton"
                                type="button"
                                class="hidden rounded-full border border-white/10 bg-white/5 px-3 py-2 text-xs font-semibold text-white/70 transition hover:border-neon-green hover:text-neon-green"
                            >
                                Clear all
                            </button>
                        </div>
                    </div>

                    <div id="selectedArtists" class="mt-5"></div>
                </div>

                <button
                    id="startButton"
                    class="mt-8 w-full rounded-full bg-white/10 px-4 py-3 font-bold text-white/40 cursor-not-allowed transition md:mx-auto md:block md:w-64"
                    disabled
                >
                    Start
                </button>
            </div>
        </section>
    </main>
</body>
</html>
